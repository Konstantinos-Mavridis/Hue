name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  # ── Debug APK (always available, no signing required) ────────────────────
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK with build metadata
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/hue-debug-${SHORT_SHA}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: hue-debug-apk
          path: app/build/outputs/apk/debug/hue-debug-*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/hue-debug-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Release APK (signed — requires KEYSTORE secrets) ─────────────────────
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'release'
    needs: build-debug-apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: gradle :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: hue-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

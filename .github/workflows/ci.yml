name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests + coverage ─────────────────────────────────────────────────
  test:
    name: Unit tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest jacocoFullReport --continue --stacktrace

      - name: Check coverage thresholds
        run: ./gradlew jacocoCoverageVerification

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/jacoco/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: build/reports/jacoco/jacocoFullReport/jacocoFullReport.xml
          fail_ci_if_error: false

  # ── Debug APK ─────────────────────────────────────────────────────────────
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Rename APK with build metadata
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/hue-debug-${SHORT_SHA}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: hue-debug-apk
          path: app/build/outputs/apk/debug/hue-debug-*.apk
          retention-days: 30

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run lint
        run: ./gradlew lintDebug --continue

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-debug.html"
          retention-days: 7
